<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Realty VA Hub</title>

  <link
    rel="icon"
    type="image/png"
    href="/home.png"
  />

  <meta
    name="description"
    content="Realty VA Hub Agency"
  />

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
    }

    /* CHAT BUBBLE */

    #rvh-chat-bubble {

      position: fixed;

      bottom: 25px;
      right: 25px;

      width: 68px;
      height: 68px;

      border-radius: 50%;

      border: none;

      cursor: pointer;

      z-index: 999999;

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #1e3a5f,
          #2563eb
        );

      color: white;

      display: flex;

      align-items: center;
      justify-content: center;

      box-shadow:
        0 12px 35px rgba(37,99,235,0.35);

      transition: all 0.25s ease;

      animation: pulse 2s infinite;
    }

    #rvh-chat-bubble:hover {

      transform: scale(1.08);

    }

    @keyframes pulse {

      0% {
        box-shadow:
          0 0 0 0 rgba(37,99,235,0.45);
      }

      70% {
        box-shadow:
          0 0 0 18px rgba(37,99,235,0);
      }

      100% {
        box-shadow:
          0 0 0 0 rgba(37,99,235,0);
      }
    }

    /* CHAT PANEL */

    #rvh-chat-panel {

      position: fixed;

      bottom: 105px;
      right: 25px;

      width: 380px;
      height: 620px;

      background: white;

      border-radius: 24px;

      overflow: hidden;

      display: none;

      flex-direction: column;

      z-index: 999999;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.18);

      font-family:
        Inter,
        Arial,
        sans-serif;

      transform:
        translateY(20px)
        scale(0.95);

      opacity: 0;

      transition:
        all 0.25s ease;
    }

    #rvh-chat-panel.open {

      display: flex;

      transform:
        translateY(0)
        scale(1);

      opacity: 1;
    }

    /* HEADER */

    .rvh-header {

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #1e3a5f
        );

      color: white;

      padding: 20px;

      display: flex;

      align-items: center;

      justify-content: space-between;
    }

    .rvh-profile {

      display: flex;

      align-items: center;

      gap: 12px;
    }

    .rvh-avatar {

      width: 48px;
      height: 48px;

      border-radius: 50%;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #60a5fa
        );

      display: flex;

      align-items: center;
      justify-content: center;

      font-size: 22px;
    }

    .rvh-name {

      font-size: 16px;
      font-weight: 700;
    }

    .rvh-status {

      font-size: 12px;

      opacity: 0.8;

      margin-top: 2px;
    }

    #rvh-close {

      border: none;

      background: rgba(255,255,255,0.12);

      color: white;

      width: 34px;
      height: 34px;

      border-radius: 50%;

      cursor: pointer;

      font-size: 16px;
    }

    /* MESSAGES */

    #rvh-messages {

      flex: 1;

      overflow-y: auto;

      padding: 18px;

      background:
        linear-gradient(
          to bottom,
          #f8fafc,
          #eef2ff
        );
    }

    .rvh-msg {

      margin-bottom: 16px;

      display: flex;

      flex-direction: column;
    }

    .rvh-msg.user {

      align-items: flex-end;
    }

    .rvh-bubble {

      max-width: 82%;

      padding: 12px 16px;

      border-radius: 18px;

      font-size: 14px;

      line-height: 1.6;
    }

    .rvh-msg.bot .rvh-bubble {

      background: white;

      color: #1e293b;

      border-bottom-left-radius: 6px;

      box-shadow:
        0 4px 10px rgba(0,0,0,0.05);
    }

    .rvh-msg.user .rvh-bubble {

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );

      color: white;

      border-bottom-right-radius: 6px;
    }

    /* INPUT */

    .rvh-input-area {

      padding: 14px;

      background: white;

      border-top:
        1px solid #e2e8f0;

      display: flex;

      gap: 10px;
    }

    #rvh-input {

      flex: 1;

      border:
        1px solid #dbeafe;

      border-radius: 14px;

      padding: 12px;

      resize: none;

      outline: none;

      font-size: 14px;

      min-height: 46px;
    }

    #rvh-input:focus {

      border-color: #2563eb;
    }

    #rvh-send {

      width: 50px;

      border: none;

      border-radius: 14px;

      cursor: pointer;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );

      color: white;

      font-size: 20px;
    }

    /* MOBILE */

    @media(max-width: 480px) {

      #rvh-chat-panel {

        width:
          calc(100vw - 20px);

        height: 85vh;

        right: 10px;

        bottom: 90px;
      }

      #rvh-chat-bubble {

        right: 15px;
        bottom: 20px;
      }
    }

  </style>

</head>

<body>

  <!-- REACT APP -->

  <div id="root"></div>

  <script
    type="module"
    src="src/main.tsx"
  ></script>

  <!-- CHAT BUBBLE -->

  <button id="rvh-chat-bubble">

    💬

  </button>

  <!-- CHAT PANEL -->

  <div id="rvh-chat-panel">

    <div class="rvh-header">

      <div class="rvh-profile">

        <div class="rvh-avatar">

          🏡

        </div>

        <div>

          <div class="rvh-name">

            Jenny

          </div>

          <div class="rvh-status">

            RealtyVA Advisor • Online

          </div>

        </div>

      </div>

      <button id="rvh-close">

        ✕

      </button>

    </div>

    <div id="rvh-messages"></div>

    <div class="rvh-input-area">

      <textarea
        id="rvh-input"
        placeholder="Ask about our VA services..."
      ></textarea>

      <button id="rvh-send">

        ➤

      </button>

    </div>

  </div>

  <script>

    window.addEventListener(
      'load',
      () => {

        const RVH_PROXY_URL =
          'https://realtyvahub-proxy2.ryan0312001.workers.dev';

        const bubble =
          document.getElementById('rvh-chat-bubble');

        const panel =
          document.getElementById('rvh-chat-panel');

        const closeBtn =
          document.getElementById('rvh-close');

        const sendBtn =
          document.getElementById('rvh-send');

        const input =
          document.getElementById('rvh-input');

        const messages =
          document.getElementById('rvh-messages');

        let history = [];

        bubble.addEventListener(
          'click',
          () => {

            panel.classList.toggle('open');

            if (
              messages.innerHTML.trim() === ''
            ) {

              addMessage(
                'bot',
                "Hey there 👋 I'm Jenny from RealtyVAHub. How can I help you today?"
              );
            }
          }
        );

        closeBtn.addEventListener(
          'click',
          () => {

            panel.classList.remove('open');
          }
        );

        sendBtn.addEventListener(
          'click',
          sendMessage
        );

        input.addEventListener(
          'keydown',
          function(e) {

            if (
              e.key === 'Enter' &&
              !e.shiftKey
            ) {

              e.preventDefault();

              sendMessage();
            }
          }
        );

        function addMessage(role, text) {

          const div =
            document.createElement('div');

          div.className =
            'rvh-msg ' + role;

          div.innerHTML =
            `
              <div class="rvh-bubble">
                ${text.replace(/\n/g,'<br>')}
              </div>
            `;

          messages.appendChild(div);

          messages.scrollTop =
            messages.scrollHeight;
        }

        async function sendMessage() {

          const text =
            input.value.trim();

          if (!text) return;

          addMessage(
            'user',
            text
          );

          input.value = '';

          history.push({
            role: 'user',
            content: text
          });

          try {

            const response =
              await fetch(
                RVH_PROXY_URL,
                {
                  method: 'POST',

                  headers: {
                    'Content-Type':
                      'application/json'
                  },

                  body: JSON.stringify({

                    model:
                      'openrouter/auto',

                    messages: history
                  })
                }
              );

            const data =
              await response.json();

            let reply =
              "Sorry, something went wrong.";

            if (
              data &&
              data.choices &&
              data.choices[0]
            ) {

              reply =
                data
                  .choices[0]
                  .message
                  .content;
            }

            addMessage(
              'bot',
              reply
            );

            history.push({
              role: 'assistant',
              content: reply
            });

          } catch (err) {

            console.error(err);

            addMessage(
              'bot',
              'Connection error. Please try again.'
            );
          }
        }
      }
    );

  </script>

</body>

</html>
```
