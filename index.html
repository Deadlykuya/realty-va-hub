  <!-- JAVASCRIPT -->

  <script>

    const RVH_PROXY_URL =
      'https://realtyvahub-proxy2.ryan0312001.workers.dev';

    let rvhOpen = false;

    let rvhHistory = [];

    function rvhGetTime() {

      return new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function rvhAddMessage(role, text) {

      const container =
        document.getElementById('rvh-messages');

      const msgDiv =
        document.createElement('div');

      msgDiv.className =
        `rvh-msg ${role}`;

      msgDiv.innerHTML =
        `
          <div class="rvh-bubble">
            ${text.replace(/\n/g,'<br>')}
          </div>
        `;

      container.appendChild(msgDiv);

      container.scrollTop =
        container.scrollHeight;
    }

    async function rvhAsk() {

      const response =
        await fetch(
          RVH_PROXY_URL,
          {
            method: 'POST',

            headers: {
              'Content-Type':
                'application/json'
            },

            body: JSON.stringify({

              model:
                'openrouter/auto',

              messages:
                rvhHistory
            })
          }
        );

      const data =
        await response.json();

      if (
        data &&
        data.choices &&
        data.choices[0]
      ) {

        const reply =
          data
            .choices[0]
            .message
            .content;

        rvhHistory.push({
          role: 'assistant',
          content: reply
        });

        rvhAddMessage(
          'bot',
          reply
        );
      }
    }

    function rvhSendMessage(text) {

      const trimmed =
        text.trim();

      if (!trimmed) return;

      rvhHistory.push({
        role: 'user',
        content: trimmed
      });

      rvhAddMessage(
        'user',
        trimmed
      );

      rvhAsk();
    }

    function rvhSend() {

      const input =
        document.getElementById('rvh-input');

      const text =
        input.value;

      input.value = '';

      rvhSendMessage(text);
    }

    function rvhKeydown(e) {

      if (
        e.key === 'Enter' &&
        !e.shiftKey
      ) {

        e.preventDefault();

        rvhSend();
      }
    }

    function rvhAutoResize(el) {

      el.style.height = 'auto';

      el.style.height =
        Math.min(
          el.scrollHeight,
          80
        ) + 'px';
    }

    function rvhToggle() {

      rvhOpen = !rvhOpen;

      const panel =
        document.getElementById('rvh-chat-panel');

      const iconChat =
        document.getElementById('rvh-icon-chat');

      const iconClose =
        document.getElementById('rvh-icon-close');

      if (rvhOpen) {

        panel.classList.add('open');

        iconChat.style.display =
          'none';

        iconClose.style.display =
          'block';

        if (
          rvhHistory.length === 0
        ) {

          rvhAddMessage(
            'bot',
            "Hey there 👋 I'm Jenny from RealtyVAHub. How can I help you today?"
          );
        }

      } else {

        panel.classList.remove('open');

        iconChat.style.display =
          'block';

        iconClose.style.display =
          'none';
      }
    }

    setTimeout(() => {

      if (!rvhOpen) {

        document
          .getElementById('rvh-badge')
          .classList.add('show');
      }

    }, 3000);

    /* THIS FIXES VITE + REACT */

    window.rvhToggle = rvhToggle;

    window.rvhSend = rvhSend;

    window.rvhKeydown = rvhKeydown;

    window.rvhAutoResize = rvhAutoResize;

  </script>
