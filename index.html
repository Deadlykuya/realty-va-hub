<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Realty VA Hub</title>

  <link rel="icon" type="image/png" href="/home.png" />

  <meta name="description" content="Realty VA Hub Agency" />
  <meta name="author" content="REVA Hub" />

  <meta property="og:title" content="Realty VA Hub Agency" />
  <meta
    property="og:description"
    content="Premium Virtual Assistant services for Real Estate professionals"
  />
  <meta property="og:type" content="website" />
  <meta
    property="og:image"
    content="https://lovable.dev/opengraph-image-p98pqg.png"
  />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@lovable_dev" />

    name="twitter:image"
    content="https://lovable.dev/opengraph-image-p98pqg.png"
  />

  <style>
    /* CHAT BUBBLE */

    #rvh-chat-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
      box-shadow: 0 6px 28px rgba(26,60,94,0.45);
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      color: white;
      font-size: 24px;
    }

    #rvh-chat-panel {
      position: fixed;
      bottom: 102px;
      right: 28px;
      width: 360px;
      height: 520px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.2);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 999999;
      font-family: Arial, sans-serif;
    }

    #rvh-chat-panel.open {
      display: flex;
    }

    .rvh-header {
      background: #1a3c5e;
      color: white;
      padding: 16px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rvh-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #f5f7fb;
    }

    .rvh-msg {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .rvh-msg.user {
      align-items: flex-end;
    }

    .rvh-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
    }

    .rvh-msg.bot .rvh-bubble {
      background: white;
      color: #222;
    }

    .rvh-msg.user .rvh-bubble {
      background: #1a3c5e;
      color: white;
    }

    .rvh-input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
    }

    #rvh-input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      resize: none;
      outline: none;
    }

    #rvh-send {
      margin-left: 10px;
      width: 45px;
      border: none;
      background: #1a3c5e;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    #rvh-close {
      cursor: pointer;
      border: none;
      background: transparent;
      color: white;
      font-size: 18px;
    }

    @media(max-width: 480px) {
      #rvh-chat-panel {
        width: calc(100vw - 20px);
        right: 10px;
        bottom: 90px;
      }
    }
  </style>
</head>

<body>

  <!-- YOUR WEBSITE -->
  <div id="root"></div>

  <!-- IMPORTANT -->
  <!-- KEEP THIS -->
  <script type="module" src="src/main.tsx"></script>

  <!-- CHAT BUBBLE -->
  <button id="rvh-chat-bubble">
    💬
  </button>

  <!-- CHAT PANEL -->
  <div id="rvh-chat-panel">

    <div class="rvh-header">
      Jenny • RealtyVA Advisor

      <button id="rvh-close">
        ✕
      </button>
    </div>

    <div class="rvh-messages" id="rvh-messages"></div>

    <div class="rvh-input-area">

      <textarea
        id="rvh-input"
        rows="1"
        placeholder="Ask something..."
      ></textarea>

      <button id="rvh-send">
        ➤
      </button>

    </div>

  </div>

  <script>

    const RVH_PROXY_URL =
      'https://realtyvahub-proxy2.ryan0312001.workers.dev';

    const bubble =
      document.getElementById('rvh-chat-bubble');

    const panel =
      document.getElementById('rvh-chat-panel');

    const closeBtn =
      document.getElementById('rvh-close');

    const sendBtn =
      document.getElementById('rvh-send');

    const input =
      document.getElementById('rvh-input');

    const messages =
      document.getElementById('rvh-messages');

    let history = [];

    bubble.addEventListener('click', () => {

      panel.classList.toggle('open');

      if (messages.innerHTML.trim() === '') {

        addMessage(
          'bot',
          "Hey there 👋 I'm Jenny from RealtyVAHub. How can I help you today?"
        );
      }
    });

    closeBtn.addEventListener('click', () => {

      panel.classList.remove('open');

    });

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', function(e) {

      if (e.key === 'Enter' && !e.shiftKey) {

        e.preventDefault();

        sendMessage();
      }
    });

    function addMessage(role, text) {

      const div = document.createElement('div');

      div.className = 'rvh-msg ' + role;

      div.innerHTML = `
        <div class="rvh-bubble">
          ${text.replace(/\n/g, '<br>')}
        </div>
      `;

      messages.appendChild(div);

      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {

      const text = input.value.trim();

      if (!text) return;

      addMessage('user', text);

      input.value = '';

      history.push({
        role: 'user',
        content: text
      });

      try {

        const response = await fetch(
          RVH_PROXY_URL,
          {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({

              model: 'openrouter/auto',

              messages: history

            })
          }
        );

        const data = await response.json();

        console.log(data);

        let reply =
          "Sorry, something went wrong.";

        if (
          data &&
          data.choices &&
          data.choices[0]
        ) {

          reply =
            data.choices[0].message.content;
        }

        addMessage('bot', reply);

        history.push({
          role: 'assistant',
          content: reply
        });

      } catch (err) {

        console.error(err);

        addMessage(
          'bot',
          'Connection error. Check Cloudflare Worker or OpenRouter API.'
        );
      }
    }

  </script>

</body>
</html>
