<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realty VA Hub</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #root {
      min-height: 100vh;
    }

    /* CHAT BUBBLE */
    #rvh-chat-bubble {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      border: none;
      background: #1a3c5e;
      color: white;
      font-size: 26px;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 5px 20px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    #rvh-chat-bubble:hover {
      transform: scale(1.08);
    }

    /* CHAT PANEL */
    #rvh-chat-panel {
      position: fixed;
      bottom: 100px;
      right: 25px;
      width: 360px;
      height: 520px;
      background: white;
      border-radius: 18px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      z-index: 9999;
    }

    #rvh-chat-panel.open {
      display: flex;
    }

    .rvh-header {
      background: #1a3c5e;
      color: white;
      padding: 15px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rvh-close-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    #rvh-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f5f7fb;
    }

    .rvh-msg {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .rvh-msg.user {
      align-items: flex-end;
    }

    .rvh-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .rvh-msg.bot .rvh-bubble {
      background: white;
      color: #222;
    }

    .rvh-msg.user .rvh-bubble {
      background: #1a3c5e;
      color: white;
    }

    .rvh-input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #ddd;
      background: white;
    }

    #rvh-input {
      flex: 1;
      resize: none;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    #rvh-send {
      margin-left: 10px;
      border: none;
      background: #1a3c5e;
      color: white;
      width: 45px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    @media(max-width: 480px) {
      #rvh-chat-panel {
        width: calc(100vw - 20px);
        right: 10px;
        bottom: 90px;
      }
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <!-- CHAT BUBBLE -->
  <button id="rvh-chat-bubble">
    💬
  </button>

  <!-- CHAT PANEL -->
  <div id="rvh-chat-panel">

    <div class="rvh-header">
      Jenny • RealtyVA Advisor
      <button class="rvh-close-btn" id="rvh-close-btn">✕</button>
    </div>

    <div id="rvh-messages"></div>

    <div class="rvh-input-area">
      <textarea
        id="rvh-input"
        placeholder="Type your message..."
        rows="1"
      ></textarea>

      <button id="rvh-send">
        ➤
      </button>
    </div>

  </div>

  <script>
    const RVH_PROXY_URL = 'https://realtyvahub-proxy2.ryan0312001.workers.dev';

    const RVH_SYSTEM_PROMPT = `
You are Jenny, a professional and friendly real estate virtual assistant advisor for RealtyVAHub.

You help real estate investors and operators learn about:
- Cold callers
- Acquisitions VAs
- Dispositions VAs
- Property management VAs
- Real estate lead generation
- CRM systems
- Real estate operations

Keep answers concise and professional.
`;

    let rvhHistory = [];

    const bubble = document.getElementById('rvh-chat-bubble');
    const panel = document.getElementById('rvh-chat-panel');
    const closeBtn = document.getElementById('rvh-close-btn');
    const messages = document.getElementById('rvh-messages');
    const input = document.getElementById('rvh-input');
    const sendBtn = document.getElementById('rvh-send');

    bubble.addEventListener('click', toggleChat);
    closeBtn.addEventListener('click', toggleChat);
    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function toggleChat() {
      panel.classList.toggle('open');

      if (messages.innerHTML.trim() === '') {
        addMessage(
          'bot',
          "Hey there 👋 I'm Jenny from RealtyVAHub. How can I help you today?"
        );
      }
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'rvh-msg ' + role;

      div.innerHTML = `
        <div class="rvh-bubble">
          ${text.replace(/\n/g, '<br>')}
        </div>
      `;

      messages.appendChild(div);

      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {

      const text = input.value.trim();

      if (!text) return;

      addMessage('user', text);

      input.value = '';

      rvhHistory.push({
        role: 'user',
        content: text
      });

      try {

        const response = await fetch(RVH_PROXY_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'openrouter/auto',
            messages: [
              {
                role: 'system',
                content: RVH_SYSTEM_PROMPT
              },
              ...rvhHistory
            ]
          })
        });

        const data = await response.json();

        let reply = "Sorry, something went wrong.";

        if (
          data &&
          data.choices &&
          data.choices[0] &&
          data.choices[0].message
        ) {
          reply = data.choices[0].message.content;
        }

        addMessage('bot', reply);

        rvhHistory.push({
          role: 'assistant',
          content: reply
        });

      } catch (error) {

        console.error(error);

        addMessage(
          'bot',
          'Connection error. Please check your Cloudflare Worker or API.'
        );
      }
    }
  </script>

</body>
</html>
```
