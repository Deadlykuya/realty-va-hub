    <!-- WIDGET JAVASCRIPT -->
    <script>
    const RVH_PROXY_URL = 'https://realtyvahub-proxy2.ryan0312001.workers.dev';

    const RVH_SYSTEM_PROMPT = `You are Jenny, a friendly and knowledgeable real estate virtual assistant advisor for RealtyVAHub — a company that places trained virtual assistants for real estate investors, agents, and operators across the U.S.

Your Personality:
- Warm, confident, and professional — like a trusted real estate colleague
- Use short paragraphs and clear language
- Occasionally use relevant real estate emojis (🏡🏢📋💼) but don't overdo it
- Show genuine enthusiasm for helping clients scale their real estate businesses

Your Purpose:
- Answer questions about RealtyVAHub's VA services, pricing, and how VAs work
- Explain the different VA roles: Cold Callers/ISAs, Acquisitions VAs, Dispositions VAs, Client Relations VAs
- Help clients figure out which VA type is right for their business
- Guide leads toward booking a discovery call or getting a quote
- Educate on real estate operations, lead generation, and scaling strategies

Your Knowledge Base (answer ONLY from these topics):
1. VA Roles at RealtyVAHub:
   - Cold Callers/ISAs: outbound prospecting, motivated seller lists, multifamily owner outreach, appointment setting
   - Acquisitions VAs: lead follow-up, deal qualification, CRM management, offer support
   - Dispositions VAs: buyer list building, deal marketing, contract coordination, closing support
   - Client Relations VAs: tenant communication, landlord updates, inbox and calendar management

2. Clients We Serve: multifamily investors, single-family wholesalers, fix-and-flip operators, property managers, real estate agents and brokers

3. Common real estate VA questions: onboarding timelines, training process, KPIs, what to expect, ROI

4. General real estate business topics: lead generation, cold calling, CRM systems (Podio, HubSpot, REsimpli, Salesforce), wholesaling, property management

Strict Rules:
- ONLY discuss real estate and RealtyVAHub topics. If asked about anything unrelated, politely redirect: "I'm specialized in real estate VA services — I'd love to help with anything in that space! 🏡"
- Never make up specific pricing — say pricing depends on role and hours, and invite them to get a custom quote
- Always end responses with a helpful next step or question to keep the conversation going
- Keep responses concise (under 120 words unless a detailed breakdown is truly needed)
- If someone seems ready to hire, guide them to: "You can book a free discovery call at RealtyVAHub.com 📋"`;

    let rvhOpen = false;
    let rvhHistory = [];
    let rvhTyping = false;

    function rvhGetTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function rvhAddMessage(role, text, quickReplies = []) {
      const container = document.getElementById('rvh-messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `rvh-msg ${role}`;
      let inner = '';
      if (role === 'bot') {
        inner += `<div class="rvh-bot-label">
          <div class="rvh-bot-avatar">J</div>
          <span class="rvh-bot-name">Jenny</span>
        </div>`;
      }
      inner += `<div class="rvh-bubble">${text.replace(/\n/g, '<br>')}</div>`;
      inner += `<div class="rvh-time">${rvhGetTime()}</div>`;
      msgDiv.innerHTML = inner;
      container.appendChild(msgDiv);
      if (quickReplies.length > 0) {
        const qrDiv = document.createElement('div');
        qrDiv.className = 'rvh-quick-replies';
        quickReplies.forEach(qr => {
          const btn = document.createElement('button');
          btn.className = 'rvh-qr';
          btn.textContent = qr;
          btn.onclick = () => { qrDiv.remove(); rvhSendMessage(qr); };
          qrDiv.appendChild(btn);
        });
        container.appendChild(qrDiv);
      }
      container.scrollTop = container.scrollHeight;
    }

    function rvhShowTyping() {
      const container = document.getElementById('rvh-messages');
      const t = document.createElement('div');
      t.id = 'rvh-typing-indicator';
      t.className = 'rvh-msg bot';
      t.innerHTML = `<div class="rvh-bot-label"><div class="rvh-bot-avatar">J</div><span class="rvh-bot-name">Jenny</span></div>
        <div class="rvh-typing"><span></span><span></span><span></span></div>`;
      container.appendChild(t);
      container.scrollTop = container.scrollHeight;
    }

    function rvhHideTyping() {
      const t = document.getElementById('rvh-typing-indicator');
      if (t) t.remove();
    }

    async function rvhAsk(userMessage) {
      // Build messages array with system prompt as first user message (OpenRouter format)
      const messages = [
        { role: 'system', content: RVH_SYSTEM_PROMPT },
        ...rvhHistory
      ];

      rvhShowTyping();
      rvhTyping = true;
      document.getElementById('rvh-send').disabled = true;

      try {
        const response = await fetch(RVH_PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'google/gemma-4-31b-it:free',
            max_tokens: 512,
            messages: messages
          })
        });

        const data = await response.json();
        rvhHideTyping();
        rvhTyping = false;
        document.getElementById('rvh-send').disabled = false;

        if (data.choices && data.choices[0]) {
          const reply = data.choices[0].message.content;
          rvhHistory.push({ role: 'assistant', content: reply });
          rvhAddMessage('bot', reply);
        } else {
          rvhAddMessage('bot', "I'm having a moment — please try again in a second! 🏡");
        }
      } catch (err) {
        rvhHideTyping();
        rvhTyping = false;
        document.getElementById('rvh-send').disabled = false;
        rvhAddMessage('bot', "Oops, something went wrong. Please try again! 🏡");
      }
    }

    function rvhSendMessage(text) {
      const trimmed = (text || '').trim();
      if (!trimmed || rvhTyping) return;
      rvhHistory.push({ role: 'user', content: trimmed });
      rvhAddMessage('user', trimmed);
      rvhAsk(trimmed);
    }

    function rvhSend() {
      const input = document.getElementById('rvh-input');
      const text = input.value.trim();
      if (!text || rvhTyping) return;
      input.value = '';
      input.style.height = 'auto';
      rvhSendMessage(text);
    }

    function rvhKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); rvhSend(); }
    }

    function rvhAutoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 80) + 'px';
    }

    function rvhToggle() {
      rvhOpen = !rvhOpen;
      const panel     = document.getElementById('rvh-chat-panel');
      const bubble    = document.getElementById('rvh-chat-bubble');
      const iconChat  = document.getElementById('rvh-icon-chat');
      const iconClose = document.getElementById('rvh-icon-close');
      const badge     = document.getElementById('rvh-badge');
      if (rvhOpen) {
        panel.classList.add('open');
        bubble.classList.add('open');
        iconChat.style.display  = 'none';
        iconClose.style.display = 'block';
        badge.classList.remove('show');
        if (rvhHistory.length === 0) {
          setTimeout(() => {
            rvhAddMessage('bot',
              "Hey there! 👋 I'm Jenny, your RealtyVAHub advisor.\n\nI help real estate investors and operators find the right virtual assistants to scale their business — from cold callers to acquisitions and dispositions VAs.\n\nWhat can I help you with today?",
              ['What VAs do you offer?', 'How much does it cost?', 'How do I get started?', 'I need a cold caller']
            );
          }, 400);
        }
      } else {
        panel.classList.remove('open');
        bubble.classList.remove('open');
        iconChat.style.display  = 'block';
        iconClose.style.display = 'none';
      }
    }

    setTimeout(() => {
      if (!rvhOpen) document.getElementById('rvh-badge').classList.add('show');
    }, 3000);
    </script>
